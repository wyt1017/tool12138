name = "toolbox-33834"
main = "src/workers/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
NODE_VERSION = "20.0.0"

[[rules]]
type = "CacheRule"
pattern = "*.{png,jpg,jpeg,gif,svg,webp}"
cache_ttl = 31536000

[[rules]]
type = "CacheRule"
pattern = "*.{js,css,woff2,woff,ttf}"
cache_ttl = 31536000

[[rules]]
type = "CacheRule"
pattern = "*.json"
cache_ttl = 3600
